name: deploy-prod

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main branch only
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "ERROR: production deploys must run from main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    needs:
      - guard-main
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Run tests
        run: go test ./...

  promote-and-tag:
    runs-on: ubuntu-latest
    needs:
      - test
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      promoted_date: ${{ steps.release_meta.outputs.promote_date }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Docker Hub settings
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "ERROR: Missing Docker Hub username. Set repository variable DOCKERHUB_USERNAME or secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "ERROR: Missing Docker Hub token. Set repository secret DOCKERHUB_TOKEN." >&2
            exit 1
          fi

          echo "username=$DOCKERHUB_USERNAME" >> "$GITHUB_OUTPUT"
          echo "image_repo=docker.io/$DOCKERHUB_USERNAME/moltenhub" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve release metadata
        id: release_meta
        run: |
          echo "promote_date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve source vnext image
        id: resolve_source
        env:
          IMAGE_REPO: ${{ steps.dockerhub.outputs.image_repo }}
        run: |
          source_tag_ref="${IMAGE_REPO}:vnext"
          inspect_output="$(docker buildx imagetools inspect "$source_tag_ref" || true)"
          source_digest="$(printf '%s\n' "$inspect_output" | awk '/^Digest:/ {print $2; exit}')"

          if [ -z "$source_digest" ]; then
            echo "ERROR: Unable to resolve digest for source image: $source_tag_ref" >&2
            echo "$inspect_output" >&2
            exit 1
          fi

          echo "source_digest=$source_digest" >> "$GITHUB_OUTPUT"
          echo "source_ref=${IMAGE_REPO}@${source_digest}" >> "$GITHUB_OUTPUT"

      - name: Promote vnext digest to prod tags
        env:
          IMAGE_REPO: ${{ steps.dockerhub.outputs.image_repo }}
          PROMOTE_DATE: ${{ steps.release_meta.outputs.promote_date }}
          SHORT_SHA: ${{ steps.release_meta.outputs.short_sha }}
          SOURCE_DIGEST: ${{ steps.resolve_source.outputs.source_digest }}
          SOURCE_REF: ${{ steps.resolve_source.outputs.source_ref }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${PROMOTE_DATE}" \
            -t "${IMAGE_REPO}:latest" \
            -t "${IMAGE_REPO}:sha-${SHORT_SHA}" \
            "${SOURCE_REF}"

          promoted_digest="$(docker buildx imagetools inspect "${IMAGE_REPO}:${PROMOTE_DATE}" | awk '/^Digest:/ {print $2; exit}')"
          if [ "$promoted_digest" != "$SOURCE_DIGEST" ]; then
            echo "ERROR: promoted digest mismatch. expected=$SOURCE_DIGEST got=$promoted_digest" >&2
            exit 1
          fi

      - name: Export image reference
        id: image
        run: echo "image_ref=${{ steps.dockerhub.outputs.image_repo }}:${{ steps.release_meta.outputs.promote_date }}" >> "$GITHUB_OUTPUT"

  smoke-image:
    runs-on: ubuntu-latest
    needs:
      - promote-and-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Resolve Docker Hub settings
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "ERROR: Missing Docker Hub username. Set repository variable DOCKERHUB_USERNAME or secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "ERROR: Missing Docker Hub token. Set repository secret DOCKERHUB_TOKEN." >&2
            exit 1
          fi

          echo "username=$DOCKERHUB_USERNAME" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image for smoke test
        run: docker pull "${{ needs.promote-and-tag.outputs.image_ref }}"

      - name: Run container smoke test
        run: bash scripts/release/run_container_smoke.sh "${{ needs.promote-and-tag.outputs.image_ref }}"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - promote-and-tag
      - smoke-image
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve deploy hook settings
        id: deploy_hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::notice title=Deploy hook skipped::DEPLOY_HOOK_URL is not configured for environment 'prod'."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Prod deploy hook
        if: ${{ steps.deploy_hook.outputs.enabled == 'true' }}
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_BEARER_TOKEN: ${{ secrets.DEPLOY_HOOK_BEARER_TOKEN }}
          MOLTENHUB_CANONICAL_BASE_URL: ${{ vars.MOLTENHUB_CANONICAL_BASE_URL || 'https://hub.molten.bot' }}
        run: |
          scripts/release/trigger_deploy_hook.sh \
            "${DEPLOY_HOOK_URL}" \
            "prod" \
            "${{ needs.promote-and-tag.outputs.image_ref }}" \
            "${{ github.sha }}"

      - name: Optional Prod health check
        if: ${{ steps.deploy_hook.outputs.enabled == 'true' && vars.HEALTHCHECK_URL != '' }}
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          bash scripts/release/check_moltenhub_health.sh "$HEALTHCHECK_URL" 30 2
