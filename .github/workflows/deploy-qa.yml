name: deploy-qa

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-qa
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_REPO: docker.io/${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}/statocyst

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Run tests
        run: go test ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - test
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:qa-${{ github.sha }}
            ${{ env.IMAGE_REPO }}:qa-latest

      - name: Export image reference
        id: image
        run: echo "image_ref=${IMAGE_REPO}:qa-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    environment: qa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger QA deploy hook
        env:
          DEPLOY_HOOK_BEARER_TOKEN: ${{ secrets.DEPLOY_HOOK_BEARER_TOKEN }}
        run: |
          scripts/release/trigger_deploy_hook.sh \
            "${{ secrets.DEPLOY_HOOK_URL }}" \
            "qa" \
            "${{ needs.build-and-push.outputs.image_ref }}" \
            "${{ github.sha }}"

      - name: Optional QA health check
        if: ${{ vars.HEALTHCHECK_URL != '' }}
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          for i in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w "%{http_code}" "$HEALTHCHECK_URL" || true)"
            if [ "$code" = "200" ]; then
              echo "health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: QA health check failed for $HEALTHCHECK_URL" >&2
          exit 1
