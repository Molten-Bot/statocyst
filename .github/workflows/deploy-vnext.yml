name: deploy-vnext

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-vnext
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Run tests
        run: go test ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - test
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Docker Hub settings
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "ERROR: Missing Docker Hub username. Set repository variable DOCKERHUB_USERNAME or secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "ERROR: Missing Docker Hub token. Set repository secret DOCKERHUB_TOKEN." >&2
            exit 1
          fi

          echo "username=$DOCKERHUB_USERNAME" >> "$GITHUB_OUTPUT"
          echo "image_repo=docker.io/$DOCKERHUB_USERNAME/moltenhub" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image metadata
        id: image_meta
        run: |
          echo "release_date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image (with retry)
        id: build
        env:
          IMAGE_REPO: ${{ steps.dockerhub.outputs.image_repo }}
          RELEASE_DATE: ${{ steps.image_meta.outputs.release_date }}
          SHORT_SHA: ${{ steps.image_meta.outputs.short_sha }}
        run: |
          set -euo pipefail

          max_attempts=3
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Buildx push attempt $attempt/$max_attempts"
            if docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --provenance=false \
              --sbom=false \
              --tag "${IMAGE_REPO}:vnext" \
              --tag "${IMAGE_REPO}:vnext-${RELEASE_DATE}" \
              --tag "${IMAGE_REPO}:sha-${SHORT_SHA}" \
              --push \
              .; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "ERROR: docker buildx build/push failed after ${max_attempts} attempts." >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 15))
            echo "Push failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - name: Export image reference
        id: image
        run: echo "image_ref=${{ steps.dockerhub.outputs.image_repo }}:vnext-${{ steps.image_meta.outputs.release_date }}" >> "$GITHUB_OUTPUT"

  smoke-image:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Resolve Docker Hub settings
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "ERROR: Missing Docker Hub username. Set repository variable DOCKERHUB_USERNAME or secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "ERROR: Missing Docker Hub token. Set repository secret DOCKERHUB_TOKEN." >&2
            exit 1
          fi

          echo "username=$DOCKERHUB_USERNAME" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image for smoke test
        run: docker pull "${{ needs.build-and-push.outputs.image_ref }}"

      - name: Run container smoke test
        run: bash scripts/release/run_container_smoke.sh "${{ needs.build-and-push.outputs.image_ref }}"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - smoke-image
    environment: vnext
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve deploy hook settings
        id: deploy_hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::notice title=Deploy hook skipped::DEPLOY_HOOK_URL is not configured for environment 'vnext'."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Trigger VNext deploy hook
        if: ${{ steps.deploy_hook.outputs.enabled == 'true' }}
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_BEARER_TOKEN: ${{ secrets.DEPLOY_HOOK_BEARER_TOKEN }}
          MOLTENHUB_CANONICAL_BASE_URL: ${{ vars.MOLTENHUB_CANONICAL_BASE_URL || 'https://hub.molten-qa.site' }}
        run: |
          scripts/release/trigger_deploy_hook.sh \
            "${DEPLOY_HOOK_URL}" \
            "vnext" \
            "${{ needs.build-and-push.outputs.image_ref }}" \
            "${{ github.sha }}"

      - name: Optional VNext health check
        if: ${{ steps.deploy_hook.outputs.enabled == 'true' && vars.HEALTHCHECK_URL != '' }}
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          bash scripts/release/check_moltenhub_health.sh "$HEALTHCHECK_URL" 30 2

  live-agent-synthetics:
    runs-on: ubuntu-latest
    needs:
      - deploy
    environment: vnext
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Resolve synthetic check settings
        id: synth
        env:
          OPENCLAW_SYNTH_AGENT_A_TOKEN: ${{ secrets.OPENCLAW_SYNTH_AGENT_A_TOKEN }}
          OPENCLAW_SYNTH_AGENT_B_TOKEN: ${{ secrets.OPENCLAW_SYNTH_AGENT_B_TOKEN }}
          OPENCLAW_SYNTH_BASE_URL: ${{ vars.OPENCLAW_SYNTH_BASE_URL || 'https://hub.molten-qa.site' }}
          OPENCLAW_SYNTH_ITERATIONS: ${{ vars.OPENCLAW_SYNTH_ITERATIONS || '6' }}
          OPENCLAW_SYNTH_MAX_P95_MS: ${{ vars.OPENCLAW_SYNTH_MAX_P95_MS || '0' }}
        run: |
          if [ -z "$OPENCLAW_SYNTH_AGENT_A_TOKEN" ] || [ -z "$OPENCLAW_SYNTH_AGENT_B_TOKEN" ]; then
            echo "::notice title=Synthetic check skipped::OPENCLAW_SYNTH_AGENT_A_TOKEN / OPENCLAW_SYNTH_AGENT_B_TOKEN are not configured for environment 'vnext'."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "base_url=$OPENCLAW_SYNTH_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "iterations=$OPENCLAW_SYNTH_ITERATIONS" >> "$GITHUB_OUTPUT"
          echo "max_p95_ms=$OPENCLAW_SYNTH_MAX_P95_MS" >> "$GITHUB_OUTPUT"

      - name: Run live OpenClaw transport synthetics
        if: ${{ steps.synth.outputs.enabled == 'true' }}
        env:
          BASE_URL: ${{ steps.synth.outputs.base_url }}
          ITERATIONS: ${{ steps.synth.outputs.iterations }}
          MAX_P95_MS: ${{ steps.synth.outputs.max_p95_ms }}
          AGENT_A_TOKEN: ${{ secrets.OPENCLAW_SYNTH_AGENT_A_TOKEN }}
          AGENT_B_TOKEN: ${{ secrets.OPENCLAW_SYNTH_AGENT_B_TOKEN }}
        run: |
          bash scripts/release/run_openclaw_transport_synthetics.sh
