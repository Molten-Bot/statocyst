name: deploy-vnext

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-vnext
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false

      - name: Run tests
        run: go test ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - test
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker Hub settings
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "ERROR: Missing Docker Hub username. Set repository variable DOCKERHUB_USERNAME or secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "ERROR: Missing Docker Hub token. Set repository secret DOCKERHUB_TOKEN." >&2
            exit 1
          fi

          echo "username=$DOCKERHUB_USERNAME" >> "$GITHUB_OUTPUT"
          echo "image_repo=docker.io/$DOCKERHUB_USERNAME/statocyst" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve release date
        id: release_date
        run: echo "release_date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.dockerhub.outputs.image_repo }}:vnext
            ${{ steps.dockerhub.outputs.image_repo }}:vnext-${{ steps.release_date.outputs.release_date }}

      - name: Export image reference
        id: image
        run: echo "image_ref=${{ steps.dockerhub.outputs.image_repo }}:vnext-${{ steps.release_date.outputs.release_date }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    environment: vnext
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy hook settings
        id: deploy_hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::notice title=Deploy hook skipped::DEPLOY_HOOK_URL is not configured for environment 'vnext'."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Trigger VNext deploy hook
        if: ${{ steps.deploy_hook.outputs.enabled == 'true' }}
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_BEARER_TOKEN: ${{ secrets.DEPLOY_HOOK_BEARER_TOKEN }}
          STATOCYST_CANONICAL_BASE_URL: ${{ vars.STATOCYST_CANONICAL_BASE_URL || 'https://hub.molten-qa.site' }}
        run: |
          scripts/release/trigger_deploy_hook.sh \
            "${DEPLOY_HOOK_URL}" \
            "vnext" \
            "${{ needs.build-and-push.outputs.image_ref }}" \
            "${{ github.sha }}"

      - name: Optional VNext health check
        if: ${{ steps.deploy_hook.outputs.enabled == 'true' && vars.HEALTHCHECK_URL != '' }}
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          attempts=0
          while [ "$attempts" -lt 30 ]; do
            code="$(curl -s -o /dev/null -w "%{http_code}" "$HEALTHCHECK_URL" || true)"
            if [ "$code" = "200" ]; then
              echo "health check passed"
              exit 0
            fi
            attempts=$((attempts + 1))
            sleep 2
          done
          echo "ERROR: vnext health check failed for $HEALTHCHECK_URL" >&2
          exit 1
