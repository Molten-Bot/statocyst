name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - moltenhub-*

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Verify generated OpenAPI markdown
        run: |
          ./scripts/generate_openapi_md.sh
          git diff --exit-code -- internal/api/openapi.md

      - name: Run tests
        run: go test ./...

  docker-build-check:
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: moltenhub:ci

  container-smoke:
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: moltenhub:smoke-ci

      - name: Run container smoke test
        run: bash scripts/release/run_container_smoke.sh moltenhub:smoke-ci

  nginx-container-smoke:
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for nginx smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: moltenhub:nginx-smoke-ci

      - name: Run nginx container smoke test
        run: bash scripts/release/run_nginx_container_smoke.sh moltenhub:nginx-smoke-ci

  federation-container-smoke:
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for federation smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: moltenhub:federation-smoke-ci

      - name: Run federation container smoke test
        run: bash scripts/release/run_federation_container_smoke.sh moltenhub:federation-smoke-ci
