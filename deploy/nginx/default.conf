worker_processes auto;

events {
	worker_connections 1024;
}

http {
	upstream moltenhub_upstream {
		server moltenhubd:8080;
		keepalive 32;
	}

	limit_req_zone $binary_remote_addr zone=moltenhub_per_ip:10m rate=500r/m;
	limit_req_status 429;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		''      close;
	}

	server {
		listen 8081;
		server_name _;

		client_max_body_size 2m;
		proxy_connect_timeout 5s;
		proxy_send_timeout 65s;
		proxy_read_timeout 65s;
		error_page 429 = @rate_limited;

		location @rate_limited {
			default_type application/json;
			add_header Cache-Control "no-store" always;
			add_header Retry-After "1" always;
			return 429 '{"failure":true,"error":"rate_limited","message":"rate limit exceeded for caller IP at nginx edge layer","retryable":true,"next_action":"wait briefly and retry from the same caller IP","error_detail":{"layer":"nginx","reason":"edge_rate_limit_exceeded"}}';
		}

		location / {
			limit_req zone=moltenhub_per_ip burst=50 nodelay;

			proxy_pass http://moltenhub_upstream;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Upgrade $http_upgrade;
		}
	}
}
