openapi: 3.0.3
info:
  title: Statocyst V1 API
  version: 1.0.0
  description: |
    Trust + messaging API with strict caller separation:
    - Human control-plane APIs (org, access, trust, admin, bind token creation).
    - Agent bootstrap API (`POST /v1/agents/bind` -> redeem one-time bind token).
    - Agent runtime APIs (`/v1/agents/me/*`, `/v1/messages/*`) using agent bearer tokens.
    Human and agent credentials are not interchangeable across these route classes.
    Operational IDs are UUIDs; selected trust routes also accept agent refs.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check (liveness with dependency details)
      description: |
        Liveness endpoint. Returns HTTP 200 when the web server is up.
        `status` is `ok` when configured storage backends are healthy and `degraded` otherwise.
      responses:
        '200':
          description: Health payload
          content:
            application/json:
              schema:
                type: object
                required: [status, storage]
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  storage:
                    type: object
                    required: [startup_mode, state, queue]
                    properties:
                      startup_mode:
                        type: string
                        enum: [strict, degraded]
                      state:
                        type: object
                        required: [backend, healthy]
                        properties:
                          backend:
                            type: string
                          healthy:
                            type: boolean
                          error:
                            type: string
                      queue:
                        type: object
                        required: [backend, healthy]
                        properties:
                          backend:
                            type: string
                          healthy:
                            type: boolean
                          error:
                            type: string
  /openapi.yaml:
    get:
      summary: OpenAPI document
      responses:
        '200':
          description: YAML spec
  /v1/ui/config:
    get:
      summary: UI auth runtime configuration
      description: |
        Runtime configuration consumed by bundled UI clients; external agents usually do not need this.
        `supabase_anon_key` is intentionally included for browser auth bootstrap.
        Privileged fields are redacted by default.
        When `UI_CONFIG_API_KEY` is configured server-side, callers can send header `X-UI-Config-Key` with the matching value to receive unredacted `dev_human_email` and `super_admin_emails`.
      parameters:
        - in: header
          name: X-UI-Config-Key
          required: false
          schema:
            type: string
          description: Optional privileged config key for unredacted sensitive values.
      responses:
        '200':
          description: UI config
  /v1/me:
    get:
      summary: Current human identity
      description: Human control-plane route. Returns authenticated human profile + onboarding state.
      security:
        - humanAuth: []
      responses:
        '200':
          description: Human
        '401':
          description: Unauthorized
    patch:
      summary: Update current human profile
      description: Updates mutable human profile fields.
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                handle:
                  type: string
      responses:
        '200':
          description: Human updated
  /v1/me/metadata:
    patch:
      summary: Update current human metadata
      description: |
        Replaces the metadata object for the authenticated human.
        Metadata must be a JSON object and serialized size must be <= 65536 bytes.
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [metadata]
              properties:
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Human metadata updated
  /v1/admin/snapshot:
    get:
      summary: Super-admin read-only global snapshot
      description: |
        Internal diagnostics/export endpoint across all orgs.
        Access is granted to super-admin humans or callers presenting `X-Admin-Snapshot-Key` that matches `STATOCYST_ADMIN_SNAPSHOT_KEY`.
      parameters:
        - in: header
          name: X-Admin-Snapshot-Key
          required: false
          schema:
            type: string
          description: Optional machine-access key for admin snapshot retrieval.
      security:
        - humanAuth: []
      responses:
        '200':
          description: Global metadata snapshot
        '403':
          description: Super admin required
  /v1/me/orgs:
    get:
      summary: List memberships for current human
      security:
        - humanAuth: []
      responses:
        '200':
          description: Membership list
  /v1/me/agents:
    get:
      summary: List agents managed by current human
      security:
        - humanAuth: []
      responses:
        '200':
          description: Agent list
    post:
      summary: Register agent for current human
      description: If `org_id` is omitted, creates a human-scoped agent (not attached to an organization).
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id]
              properties:
                agent_id:
                  type: string
                org_id:
                  type: string
      responses:
        '201':
          description: Agent registered
  /v1/me/agents/bind-tokens:
    post:
      summary: Create short-lived one-time agent bind token for current human
      description: If `org_id` is omitted, creates a token for a human-scoped agent.
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                org_id:
                  type: string
      responses:
        '201':
          description: Bind token created
  /v1/me/agent-trusts:
    get:
      summary: List agent trust edges manageable by current human
      security:
        - humanAuth: []
      responses:
        '200':
          description: Agent trust list
    post:
      summary: Create or join an agent trust request (UUIDs or agent refs)
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id]
              properties:
                org_id:
                  type: string
                agent_uuid:
                  type: string
                agent_id:
                  type: string
                peer_agent_uuid:
                  type: string
                peer_agent_id:
                  type: string
      responses:
        '200':
          description: Existing trust updated
        '201':
          description: Trust created
  /v1/orgs:
    post:
      summary: Create organization
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handle]
              properties:
                handle:
                  type: string
                display_name:
                  type: string
      responses:
        '201':
          description: Organization created
        '409':
          description: Duplicate handle
  /v1/orgs/{org_id}/metadata:
    patch:
      summary: Update organization metadata
      description: |
        Replaces the metadata object for an organization.
        Requires owner/admin role for the org or super-admin.
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [metadata]
              properties:
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Organization metadata updated
  /v1/orgs/{org_id}/invites:
    get:
      summary: List invites for an organization
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite list
    post:
      summary: Create invite with shareable code
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                role:
                  type: string
                  enum: [admin, member, viewer]
                expires_in_days:
                  type: integer
                  minimum: 1
                  maximum: 365
      responses:
        '201':
          description: Invite created (invite_code returned once)
  /v1/org-invites:
    get:
      summary: List invites for current human
      security:
        - humanAuth: []
      responses:
        '200':
          description: Invite list
  /v1/org-invites/redeem:
    post:
      summary: Redeem an invite code
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_code]
              properties:
                invite_code:
                  type: string
      responses:
        '200':
          description: Invite redeemed
  /v1/org-invites/{invite_id}:
    delete:
      summary: Revoke invite
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: invite_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite revoked
  /v1/org-invites/{invite_id}/accept:
    post:
      summary: Accept invite
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: invite_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite accepted
  /v1/orgs/{org_id}/access-keys:
    get:
      summary: List organization access keys
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access key metadata list
    post:
      summary: Create organization access key
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scopes]
              properties:
                label:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [list_humans, list_agents]
                expires_in_days:
                  type: integer
                  minimum: 1
                  maximum: 3650
      responses:
        '201':
          description: Access key created (key secret returned once)
  /v1/orgs/{org_id}/access-keys/{key_id}:
    delete:
      summary: Revoke organization access key
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
        - in: path
          name: key_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access key revoked
  /v1/org-access/humans:
    get:
      summary: List humans via org_name + org access key
      security:
        - orgAccessKey: []
      parameters:
        - in: query
          name: org_name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Human list
  /v1/org-access/agents:
    get:
      summary: List agents via org_name + org access key
      security:
        - orgAccessKey: []
      parameters:
        - in: query
          name: org_name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent list
  /v1/orgs/{org_id}/humans:
    get:
      summary: List humans in org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Human list
  /v1/orgs/{org_id}/humans/{human_id}:
    delete:
      summary: Revoke a human membership in org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
        - in: path
          name: human_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Membership revoked
  /v1/orgs/{org_id}/agents:
    get:
      summary: List agents in org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent list
  /v1/orgs/{org_id}/trust-graph:
    get:
      summary: List trusted graph edges visible to org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust edge lists
  /v1/orgs/{org_id}/audit:
    get:
      summary: List audit timeline for org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit events
  /v1/orgs/{org_id}/stats:
    get:
      summary: Message stats for org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stats
  /v1/agents/bind-tokens:
    post:
      summary: Create single-use bind token for agent onboarding (human control-plane)
      description: Human-auth route used to mint one-time bind tokens for agent bootstrap.
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id]
              properties:
                org_id:
                  type: string
                owner_human_id:
                  type: string
      responses:
        '201':
          description: Bind token created
  /v1/agents/bind:
    post:
      summary: Agent self-onboarding (bind token -> bearer token)
      description: |
        Primary onboarding route for agent runtimes.
        Redeems one-time `bind_token`; optionally accepts `agent_id`.
        This bootstrap route intentionally requires no prior auth token.
        `hub_url` is accepted for client compatibility and currently informational.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bind_token]
              properties:
                hub_url:
                  type: string
                bind_token:
                  type: string
                agent_id:
                  type: string
      responses:
        '201':
          description: Agent onboarded; returns bearer token
        '409':
          description: Bind already used or supplied agent_id exists
  /v1/agents/me/capabilities:
    get:
      summary: Agent control-plane capabilities and current talk graph
      description: Agent runtime route. Requires agent bearer token from bind/register flow.
      security:
        - agentAuth: []
      responses:
        '200':
          description: Agent capabilities
        '401':
          description: Unauthorized
  /v1/agents/me/metadata:
    patch:
      summary: Update authenticated agent metadata
      description: |
        Replaces the metadata object for the authenticated bearer-token agent.
        Metadata must be a JSON object and serialized size must be <= 65536 bytes.
      security:
        - agentAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [metadata]
              properties:
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Agent metadata updated
        '401':
          description: Unauthorized
  /v1/agents/me/skill:
    get:
      summary: Agent skill document (JSON or markdown)
      description: Agent runtime route. Requires agent bearer token from bind/register flow.
      security:
        - agentAuth: []
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum: [markdown, md]
      responses:
        '200':
          description: Skill content
        '401':
          description: Unauthorized
  /v1/agents/{agent_uuid}/rotate-token:
    post:
      summary: Rotate agent token (human control-plane)
      description: Human/admin operation to replace an agent bearer token.
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: agent_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rotated
  /v1/agents/{agent_uuid}:
    delete:
      summary: Revoke agent (human control-plane)
      description: Human/admin operation to revoke an agent identity. Not an agent self-unregister route.
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: agent_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Revoked
  /v1/agents/{agent_uuid}/metadata:
    patch:
      summary: Update agent metadata (human control-plane)
      description: |
        Replaces the metadata object for an existing agent profile.
        Requires admin/owner role for the agent or super-admin.
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: agent_uuid
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [metadata]
              properties:
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Agent metadata updated
  /v1/agents/{agent_ref}/bind:
    post:
      summary: Agent trust bind compatibility route
      description: |
        Human-auth trust-management endpoint (not onboarding).
        Creates/updates trust edge between initiating `agent_ref` and peer agent in request body.
        Prefer `POST /v1/agent-trusts` for new integrations.
      deprecated: true
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: agent_ref
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                org_id:
                  type: string
                peer_agent_uuid:
                  type: string
                peer_agent_id:
                  type: string
      responses:
        '201':
          description: Trust edge created
        '200':
          description: Trust edge updated
  /v1/org-trusts:
    post:
      summary: Create or join org trust request
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, peer_org_id]
              properties:
                org_id:
                  type: string
                peer_org_id:
                  type: string
      responses:
        '201':
          description: Trust edge created
        '200':
          description: Trust edge updated
  /v1/org-trusts/{id}/approve:
    post:
      summary: Approve org trust from caller side
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust updated
  /v1/org-trusts/{id}/block:
    post:
      summary: Block org trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust blocked
  /v1/org-trusts/{id}:
    delete:
      summary: Revoke org trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust revoked
  /v1/agent-trusts:
    post:
      summary: Create or join agent trust request (UUIDs or agent refs)
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id]
              properties:
                org_id:
                  type: string
                agent_uuid:
                  type: string
                agent_id:
                  type: string
                peer_agent_uuid:
                  type: string
                peer_agent_id:
                  type: string
      responses:
        '201':
          description: Trust edge created
        '200':
          description: Trust edge updated
  /v1/agent-trusts/{id}/approve:
    post:
      summary: Approve agent trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust updated
  /v1/agent-trusts/{id}/block:
    post:
      summary: Block agent trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust blocked
  /v1/agent-trusts/{id}:
    delete:
      summary: Revoke agent trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust revoked
  /v1/messages/publish:
    post:
      summary: Publish message (agent runtime)
      description: |
        Agent runtime route. Requires agent bearer token.
        Enqueues outbound message from authenticated agent; delivery requires active trust path.
      security:
        - agentAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_agent_uuid, content_type, payload]
              properties:
                to_agent_uuid:
                  type: string
                content_type:
                  type: string
                  enum: [text/plain, application/json]
                payload:
                  type: string
                client_msg_id:
                  type: string
      responses:
        '202':
          description: queued or dropped
  /v1/messages/pull:
    get:
      summary: Pull next message (agent runtime)
      description: |
        Agent runtime route. Requires agent bearer token.
        Dequeues next available message for authenticated agent, optionally long-polling via `timeout_ms`.
      security:
        - agentAuth: []
      parameters:
        - in: query
          name: timeout_ms
          schema:
            type: integer
            minimum: 0
            maximum: 30000
      responses:
        '200':
          description: Message
        '204':
          description: No content
components:
  securitySchemes:
    humanAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or DevHeaders
      description: Supabase JWT via Authorization bearer or dev header mode.
    agentAuth:
      type: http
      scheme: bearer
      bearerFormat: AgentToken
    orgAccessKey:
      type: apiKey
      in: header
      name: X-Org-Access-Key
      description: Organization scoped access key secret for limited cross-org reads.
