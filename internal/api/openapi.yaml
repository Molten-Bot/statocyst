openapi: 3.0.3
info:
  title: Statocyst V1 API
  version: 1.0.0
  description: In-memory company internet PoC with org/human/agent trust controls.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /healthz:
    get:
      summary: Health check alias
      responses:
        '200':
          description: OK
  /openapi.yaml:
    get:
      summary: OpenAPI document
      responses:
        '200':
          description: YAML spec
  /v1/ui/config:
    get:
      summary: UI auth runtime configuration
      responses:
        '200':
          description: UI config
  /v1/me:
    get:
      summary: Current human identity
      security:
        - humanAuth: []
      responses:
        '200':
          description: Human
        '401':
          description: Unauthorized
    patch:
      summary: Update current human profile (confirms handle onboarding)
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                handle:
                  type: string
                is_public:
                  type: boolean
      responses:
        '200':
          description: Human updated
  /v1/admin/snapshot:
    get:
      summary: Super-admin read-only global snapshot
      security:
        - humanAuth: []
      responses:
        '200':
          description: Global metadata snapshot
        '403':
          description: Super admin required
  /v1/me/orgs:
    get:
      summary: List memberships for current human
      security:
        - humanAuth: []
      responses:
        '200':
          description: Membership list
  /v1/me/agents:
    get:
      summary: List agents managed by current human
      security:
        - humanAuth: []
      responses:
        '200':
          description: Agent list
    post:
      summary: Register agent for current human (auto personal org if org_id omitted)
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id]
              properties:
                agent_id:
                  type: string
                org_id:
                  type: string
      responses:
        '201':
          description: Agent registered
  /v1/me/agents/bind-tokens:
    post:
      summary: Create short-lived one-time agent bind token for current human
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                org_id:
                  type: string
      responses:
        '201':
          description: Bind token created
  /v1/me/agent-trusts:
    get:
      summary: List agent trust edges manageable by current human
      security:
        - humanAuth: []
      responses:
        '200':
          description: Agent trust list
    post:
      summary: Create or join an agent trust request (UUIDs or agent refs)
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id]
              properties:
                org_id:
                  type: string
                agent_uuid:
                  type: string
                agent_id:
                  type: string
                peer_agent_uuid:
                  type: string
                peer_agent_id:
                  type: string
      responses:
        '200':
          description: Existing trust updated
        '201':
          description: Trust created
  /v1/orgs:
    post:
      summary: Create organization
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handle]
              properties:
                handle:
                  type: string
                display_name:
                  type: string
      responses:
        '201':
          description: Organization created
        '409':
          description: Duplicate handle
  /v1/orgs/{org_id}/invites:
    get:
      summary: List invites for an organization
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite list
    post:
      summary: Create invite with shareable code
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                role:
                  type: string
                  enum: [admin, member, viewer]
                expires_in_days:
                  type: integer
                  minimum: 1
                  maximum: 365
      responses:
        '201':
          description: Invite created (invite_code returned once)
  /v1/org-invites:
    get:
      summary: List invites for current human
      security:
        - humanAuth: []
      responses:
        '200':
          description: Invite list
  /v1/org-invites/redeem:
    post:
      summary: Redeem an invite code
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invite_code]
              properties:
                invite_code:
                  type: string
      responses:
        '200':
          description: Invite redeemed
  /v1/org-invites/{invite_id}:
    delete:
      summary: Revoke invite
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: invite_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite revoked
  /v1/org-invites/{invite_id}/accept:
    post:
      summary: Accept invite
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: invite_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invite accepted
  /v1/orgs/{org_id}/access-keys:
    get:
      summary: List organization access keys
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access key metadata list
    post:
      summary: Create organization access key
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scopes]
              properties:
                label:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [list_humans, list_agents]
                expires_in_days:
                  type: integer
                  minimum: 1
                  maximum: 3650
      responses:
        '201':
          description: Access key created (key secret returned once)
  /v1/orgs/{org_id}/access-keys/{key_id}:
    delete:
      summary: Revoke organization access key
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
        - in: path
          name: key_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access key revoked
  /v1/org-access/humans:
    get:
      summary: List humans via org_name + org access key
      security:
        - orgAccessKey: []
      parameters:
        - in: query
          name: org_name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Human list
  /v1/org-access/agents:
    get:
      summary: List agents via org_name + org access key
      security:
        - orgAccessKey: []
      parameters:
        - in: query
          name: org_name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent list
  /v1/orgs/{org_id}/humans:
    get:
      summary: List humans in org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Human list
  /v1/orgs/{org_id}/humans/{human_id}:
    delete:
      summary: Revoke a human membership in org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
        - in: path
          name: human_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Membership revoked
  /v1/orgs/{org_id}/agents:
    get:
      summary: List agents in org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent list
  /v1/orgs/{org_id}/trust-graph:
    get:
      summary: List trusted graph edges visible to org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust edge lists
  /v1/orgs/{org_id}/audit:
    get:
      summary: List audit timeline for org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit events
  /v1/orgs/{org_id}/stats:
    get:
      summary: Message stats for org
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: org_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stats
  /v1/agents/register:
    post:
      summary: Register org or human-owned agent
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, agent_id]
              properties:
                org_id:
                  type: string
                agent_id:
                  type: string
                owner_human_id:
                  type: string
      responses:
        '201':
          description: Agent created with token
  /v1/agents/bind-tokens:
    post:
      summary: Create single-use bind token for agent onboarding
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id]
              properties:
                org_id:
                  type: string
                owner_human_id:
                  type: string
      responses:
        '201':
          description: Bind token created
  /v1/agents/bind/redeem:
    post:
      summary: Redeem bind token and mint long-lived agent token (+ control plane + skill)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bind_token, agent_id]
              properties:
                bind_token:
                  type: string
                agent_id:
                  type: string
      responses:
        '201':
          description: Agent onboarded with token, control_plane, and skill markdown
        '409':
          description: Bind already used or agent id exists
  /v1/agents/me/capabilities:
    get:
      summary: Agent control-plane capabilities and current talk graph
      security:
        - agentAuth: []
      responses:
        '200':
          description: Agent capabilities
        '401':
          description: Unauthorized
  /v1/agents/me/skill:
    get:
      summary: Agent skill document (JSON or markdown)
      security:
        - agentAuth: []
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum: [markdown, md]
      responses:
        '200':
          description: Skill content
        '401':
          description: Unauthorized
  /v1/agents/{agent_uuid}/rotate-token:
    post:
      summary: Rotate token
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: agent_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rotated
  /v1/agents/{agent_uuid}:
    delete:
      summary: Revoke agent
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: agent_uuid
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Revoked
  /v1/agents/{agent_ref}/bind:
    post:
      summary: Compatibility bind route (path agent ref + peer in body)
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: agent_ref
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                org_id:
                  type: string
                peer_agent_uuid:
                  type: string
                peer_agent_id:
                  type: string
      responses:
        '201':
          description: Trust edge created
        '200':
          description: Trust edge updated
  /v1/org-trusts:
    post:
      summary: Create or join org trust request
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, peer_org_id]
              properties:
                org_id:
                  type: string
                peer_org_id:
                  type: string
      responses:
        '201':
          description: Trust edge created
        '200':
          description: Trust edge updated
  /v1/org-trusts/{id}/approve:
    post:
      summary: Approve org trust from caller side
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust updated
  /v1/org-trusts/{id}/block:
    post:
      summary: Block org trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust blocked
  /v1/org-trusts/{id}:
    delete:
      summary: Revoke org trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust revoked
  /v1/agent-trusts:
    post:
      summary: Create or join agent trust request (UUIDs or agent refs)
      security:
        - humanAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id]
              properties:
                org_id:
                  type: string
                agent_uuid:
                  type: string
                agent_id:
                  type: string
                peer_agent_uuid:
                  type: string
                peer_agent_id:
                  type: string
      responses:
        '201':
          description: Trust edge created
        '200':
          description: Trust edge updated
  /v1/agent-trusts/{id}/approve:
    post:
      summary: Approve agent trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust updated
  /v1/agent-trusts/{id}/block:
    post:
      summary: Block agent trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust blocked
  /v1/agent-trusts/{id}:
    delete:
      summary: Revoke agent trust
      security:
        - humanAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trust revoked
  /v1/messages/publish:
    post:
      summary: Publish message
      security:
        - agentAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_agent_uuid, content_type, payload]
              properties:
                to_agent_uuid:
                  type: string
                content_type:
                  type: string
                  enum: [text/plain, application/json]
                payload:
                  type: string
                client_msg_id:
                  type: string
      responses:
        '202':
          description: queued or dropped
  /v1/messages/pull:
    get:
      summary: Pull next message
      security:
        - agentAuth: []
      parameters:
        - in: query
          name: timeout_ms
          schema:
            type: integer
            minimum: 0
            maximum: 30000
      responses:
        '200':
          description: Message
        '204':
          description: No content
  /v1/live/snapshot:
    get:
      summary: Public live snapshot for static site generation
      responses:
        '200':
          description: Public organizations/humans/agents snapshot
components:
  securitySchemes:
    humanAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or DevHeaders
      description: Supabase JWT via Authorization bearer or dev header mode.
    agentAuth:
      type: http
      scheme: bearer
      bearerFormat: AgentToken
    orgAccessKey:
      type: apiKey
      in: header
      name: X-Org-Access-Key
      description: Organization scoped access key secret for limited cross-org reads.
