<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Statocyst Profile</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --ink: #1f2933;
        --muted: #52606d;
        --panel: #ffffff;
        --line: #d9e2ec;
        --accent: #0b7285;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #f8fafc, #eef2f7);
      }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: #fff;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      nav a {
        margin-right: 12px;
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
      .navButton {
        width: auto;
        margin: 0;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      main {
        max-width: 1100px;
        margin: 16px auto;
        padding: 0 12px 24px;
      }
      .banner {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 12px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
      }
      h2 {
        margin: 4px 0 10px;
        font-size: 1rem;
      }
      .status {
        margin-top: 6px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
      }
      .status.warn {
        background: #fef9c3;
        border-color: #facc15;
        color: #713f12;
      }
      .muted {
        color: var(--muted);
      }
      .profileRows {
        display: grid;
        gap: 8px;
      }
      .row {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
      }
      .label {
        display: block;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .value {
        margin-top: 4px;
        font-weight: 600;
      }
      .list {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      .list li {
        margin: 4px 0;
      }
      a {
        color: var(--accent);
      }
      .inviteList {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }
      .inviteItem {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
      }
      .inviteMeta {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .inviteActions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .inviteActions button {
        width: auto;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .inviteActions button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <div>
          <strong data-app-name>Statocyst</strong>
          <nav style="margin-top: 6px">
            <a href="/agents">Agents</a>
            <a href="/organization">Organization</a>
            <a href="/profile">Profile</a>
            <a href="/domains" data-super-admin-only style="display: none">Domains (Legacy)</a>
          </nav>
        </div>
        <button id="btnLogout" class="navButton" type="button">Logout</button>
      </div>
    </header>

    <main>
      <div class="grid">
        <section class="panel">
          <h2>Your Profile</h2>
          <div id="profileStatus" class="status">Loading profile...</div>
          <div class="profileRows">
            <div class="row">
              <span class="label">Email</span>
              <div class="value" id="profileEmail">-</div>
            </div>
            <div class="row">
              <span class="label">Joined On</span>
              <div class="value" id="profileJoined">-</div>
            </div>
            <div class="row">
              <span class="label">Organizations</span>
              <div class="value" id="profileOrgs">-</div>
            </div>
            <div class="row" id="superAdminRow" style="display: none">
              <span class="label">Account Role</span>
              <div class="value">Super Admin</div>
            </div>
            <div class="row">
              <span class="label">Invites</span>
              <div id="inviteStatus" class="muted">Loading invites...</div>
              <div class="inviteList" id="inviteList"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="/common.js"></script>
    <script src="/profile.js"></script>
  </body>
</html>
