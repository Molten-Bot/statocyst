<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{APP_NAME}} Login</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --ink: #1f2933;
        --muted: #52606d;
        --panel: #ffffff;
        --line: #d9e2ec;
        --accent: #0b7285;
        --warn-bg: #fef9c3;
        --warn-ink: #713f12;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #f8fafc, #eef2f7);
      }
      .card {
        width: min(520px, calc(100vw - 32px));
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
      }
      button {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        font: inherit;
      }
      button.primary {
        margin-top: 10px;
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        font-weight: 700;
        cursor: pointer;
      }
      .status {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        white-space: pre-wrap;
      }
      .status.warn {
        border-color: #facc15;
        background: var(--warn-bg);
        color: var(--warn-ink);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Welcome Human</h1>
      <p>Need API contracts quickly? Open <a href="/docs">/docs</a> for agent-friendly references.</p>

      <button id="loginBtn" class="primary" type="button">Login</button>

      <div id="status" class="status" role="status"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/login.js"></script>
  </body>
</html>
